<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cause of Death</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }

    .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

    h1 { font-size: 1.8rem; margin-bottom: 8px; }
    .subtitle { color: #7d8590; margin-bottom: 24px; }

    /* Input form */
    .input-section { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 24px; }
    .input-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .input-row label { display: block; font-size: 0.85rem; color: #7d8590; margin-bottom: 4px; }
    .input-row .field { flex: 1; min-width: 200px; }
    .input-row input { width: 100%; padding: 8px 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; font-size: 0.9rem; }
    .input-row input:focus { outline: none; border-color: #58a6ff; }
    .btn { padding: 8px 20px; background: #238636; border: 1px solid #2ea043; border-radius: 6px; color: #fff; font-size: 0.9rem; cursor: pointer; font-weight: 500; }
    .btn:hover { background: #2ea043; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: #21262d; border-color: #30363d; }
    .btn-secondary:hover { background: #30363d; }
    .btn-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    /* Auto-refresh controls */
    .refresh-controls { display: none; align-items: center; gap: 12px; margin-left: auto; font-size: 0.85rem; }
    .refresh-controls.visible { display: flex; }
    .refresh-controls label { color: #7d8590; cursor: pointer; display: flex; align-items: center; gap: 4px; }
    .refresh-controls select { padding: 4px 8px; background: #161b22; border: 1px solid #30363d; border-radius: 4px; color: #e6edf3; font-size: 0.8rem; }
    .refresh-indicator { color: #3fb950; font-size: 0.8rem; opacity: 0; transition: opacity 0.3s; }
    .refresh-indicator.show { opacity: 1; }

    /* Status */
    .status { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; display: none; }
    .status.loading { display: block; background: #161b22; border: 1px solid #30363d; color: #7d8590; }
    .status.error { display: block; background: #1c1214; border: 1px solid #f85149; color: #f85149; }

    /* Tab bar */
    .tab-bar { display: none; border-bottom: 1px solid #30363d; margin-bottom: 16px; }
    .tab-bar.visible { display: flex; }
    .tab-btn { padding: 10px 20px; background: none; border: none; border-bottom: 2px solid transparent; color: #7d8590; font-size: 0.9rem; cursor: pointer; font-weight: 500; }
    .tab-btn:hover { color: #e6edf3; }
    .tab-btn.active { color: #58a6ff; border-bottom-color: #58a6ff; }

    /* Results header */
    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .results-header h2 { font-size: 1.2rem; }
    .sort-controls { display: flex; gap: 8px; align-items: center; }
    .sort-controls label { font-size: 0.8rem; color: #7d8590; }
    .sort-controls select { padding: 4px 8px; background: #161b22; border: 1px solid #30363d; border-radius: 4px; color: #e6edf3; font-size: 0.8rem; }

    /* Pull list */
    .pull-list { display: flex; flex-direction: column; gap: 8px; }

    .pull-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
    .pull-header { display: flex; align-items: center; padding: 12px 16px; cursor: pointer; gap: 12px; flex-wrap: wrap; }
    .pull-header:hover { background: #1c2128; }

    .pull-num { font-weight: 700; font-size: 1rem; min-width: 32px; color: #58a6ff; }
    .pull-duration { font-size: 0.85rem; color: #7d8590; min-width: 48px; }
    .pull-phase { font-size: 0.8rem; padding: 2px 8px; border-radius: 12px; background: #1f2937; color: #9ca3af; min-width: 60px; text-align: center; }
    .pull-wipe-label { flex: 1; font-size: 0.9rem; font-weight: 500; }
    .pull-vod-link { font-size: 0.8rem; }
    .pull-vod-link a { color: #a371f7; text-decoration: none; }
    .pull-vod-link a:hover { text-decoration: underline; }
    .pull-expand { font-size: 0.8rem; color: #7d8590; transition: transform 0.2s; }
    .pull-card.open .pull-expand { transform: rotate(90deg); }

    .pull-detail { display: none; padding: 0 16px 16px; border-top: 1px solid #30363d; }
    .pull-card.open .pull-detail { display: block; }

    .detail-section { margin-top: 12px; }
    .detail-section h3 { font-size: 0.85rem; color: #7d8590; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }

    .wipe-box { background: #1c1214; border: 1px solid #f8514933; border-radius: 6px; padding: 12px; }
    .wipe-box .wipe-title { font-weight: 600; color: #f85149; margin-bottom: 4px; }
    .wipe-box .wipe-desc { font-size: 0.85rem; color: #b1bac4; margin-bottom: 6px; }
    .wipe-box .wipe-context { font-size: 0.82rem; color: #d2a8ff; background: #1c1228; border-radius: 4px; padding: 6px 10px; margin-bottom: 6px; }
    .wipe-box .wipe-meta { font-size: 0.8rem; color: #7d8590; display: flex; gap: 16px; }
    .wipe-box .wipe-meta a { color: #a371f7; text-decoration: none; }
    .wipe-box .wipe-meta a:hover { text-decoration: underline; }

    .death-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .death-table th { text-align: left; padding: 6px 8px; color: #7d8590; border-bottom: 1px solid #30363d; font-weight: 500; }
    .death-table td { padding: 6px 8px; border-bottom: 1px solid #21262d; }
    .death-table tr:last-child td { border-bottom: none; }
    .death-table .player { font-weight: 500; }
    .death-table .cause { color: #f0883e; }
    .death-table .timestamp { color: #7d8590; }
    .death-table a { color: #a371f7; text-decoration: none; }
    .death-table a:hover { text-decoration: underline; }

    .kill-badge { background: #238636; color: #fff; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; }
    .wipe-badge { background: #da3633; color: #fff; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; }

    .no-deaths { color: #7d8590; font-size: 0.85rem; font-style: italic; }

    /* ── Latest Pull tab ─────────────────────────────────────────────── */
    .latest-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow: hidden; }
    .latest-header { padding: 20px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; border-bottom: 1px solid #30363d; }
    .latest-pull-num { font-size: 1.8rem; font-weight: 700; color: #58a6ff; }
    .latest-meta { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    .latest-meta .pull-duration { font-size: 1rem; }
    .latest-meta .pull-phase { font-size: 0.9rem; padding: 4px 12px; }
    .latest-body { padding: 20px 24px; }
    .latest-wipe-box { background: #1c1214; border: 1px solid #f8514933; border-radius: 8px; padding: 16px 20px; margin-bottom: 20px; }
    .latest-wipe-box .wipe-title { font-size: 1.2rem; font-weight: 700; color: #f85149; margin-bottom: 6px; }
    .latest-wipe-box .wipe-desc { font-size: 0.95rem; color: #b1bac4; margin-bottom: 8px; }
    .latest-wipe-box .wipe-context { font-size: 0.88rem; color: #d2a8ff; background: #1c1228; border-radius: 4px; padding: 8px 12px; margin-bottom: 8px; }
    .latest-wipe-box .wipe-meta { font-size: 0.85rem; color: #7d8590; display: flex; gap: 16px; }
    .latest-wipe-box .wipe-meta a { color: #a371f7; text-decoration: none; }
    .latest-kill-box { background: #122117; border: 1px solid #23863633; border-radius: 8px; padding: 16px 20px; margin-bottom: 20px; }
    .latest-kill-box .kill-title { font-size: 1.2rem; font-weight: 700; color: #3fb950; }
    .latest-no-pull { text-align: center; color: #7d8590; padding: 40px 20px; font-size: 1rem; }

    /* ── Statistics tab ───────────────────────────────────────────────── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; text-align: center; }
    .stat-card .stat-value { font-size: 1.6rem; font-weight: 700; color: #58a6ff; }
    .stat-card .stat-label { font-size: 0.8rem; color: #7d8590; margin-top: 4px; }

    .stats-section { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
    .stats-section h3 { font-size: 0.95rem; color: #7d8590; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }

    .stat-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer; border-radius: 4px; padding: 2px 0; }
    .stat-bar-row:hover { background: #1c2128; }
    .stat-bar-label { font-size: 0.85rem; min-width: 180px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stat-bar-track { flex: 1; height: 20px; background: #21262d; border-radius: 4px; overflow: hidden; }
    .stat-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
    .stat-bar-count { font-size: 0.85rem; color: #7d8590; min-width: 32px; }

    .stats-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .stats-table th { text-align: left; padding: 8px; color: #7d8590; border-bottom: 1px solid #30363d; font-weight: 500; cursor: pointer; }
    .stats-table th:hover { color: #e6edf3; }
    .stats-table td { padding: 8px; border-bottom: 1px solid #21262d; }
    .stats-table tr:last-child td { border-bottom: none; }

    /* Filter banner */
    .filter-banner { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: #1c1228; border: 1px solid #a371f733; border-radius: 6px; margin-bottom: 12px; font-size: 0.85rem; }
    .filter-banner .filter-label { color: #d2a8ff; }
    .filter-banner .filter-value { color: #e6edf3; font-weight: 600; }
    .filter-banner .filter-clear { color: #7d8590; cursor: pointer; margin-left: auto; text-decoration: underline; }
    .filter-banner .filter-clear:hover { color: #e6edf3; }

    /* Wowhead tooltip overrides */
    .wowhead-link { color: #f0883e; text-decoration: none; }
    .wowhead-link:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      .pull-header { padding: 10px 12px; gap: 8px; }
      .input-row { flex-direction: column; }
      .input-row .field { min-width: unset; }
      .btn-row { flex-direction: column; align-items: stretch; }
      .refresh-controls { margin-left: 0; }
      .stat-bar-label { min-width: 120px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cause of Death</h1>
    <p class="subtitle">WoW raid wipe analysis &mdash; WarcraftLogs + VOD timestamps</p>

    <div class="input-section">
      <div class="input-row">
        <div class="field">
          <label for="log-url">WarcraftLogs Report URL</label>
          <input type="text" id="log-url" placeholder="https://www.warcraftlogs.com/reports/...">
        </div>
      </div>
      <div class="input-row">
        <div class="field">
          <label for="vod-url">Twitch VOD URL or Channel Name</label>
          <input type="text" id="vod-url" placeholder="https://www.twitch.tv/videos/... or channel name">
        </div>
        <div class="field" style="max-width: 160px;">
          <label for="stream-delay">Stream Delay (sec)</label>
          <input type="number" id="stream-delay" value="0" min="0" max="300" placeholder="0">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn" id="analyze-btn" onclick="startSession()">Analyze</button>
        <button class="btn btn-secondary" id="refresh-btn" onclick="refreshSession()" style="display:none">Refresh</button>
        <div class="refresh-controls" id="refresh-controls">
          <label>
            <input type="checkbox" id="auto-refresh" onchange="toggleAutoRefresh()">
            Auto-refresh every
          </label>
          <select id="refresh-interval" onchange="toggleAutoRefresh()">
            <option value="15">15s</option>
            <option value="30" selected>30s</option>
            <option value="60">60s</option>
          </select>
          <span class="refresh-indicator" id="refresh-indicator">New pull detected!</span>
        </div>
      </div>
    </div>

    <div class="status" id="status"></div>

    <div class="tab-bar" id="tab-bar">
      <button class="tab-btn active" data-tab="latest" onclick="switchTab('latest')">Latest Pull</button>
      <button class="tab-btn" data-tab="all" onclick="switchTab('all')">All Pulls</button>
      <button class="tab-btn" data-tab="stats" onclick="switchTab('stats')">Statistics</button>
    </div>

    <div id="tab-latest" style="display:none"></div>
    <div id="tab-all" style="display:none"></div>
    <div id="tab-stats" style="display:none"></div>
  </div>

  <script>
    // ── State ───────────────────────────────────────────────────────────
    let sessionId = null;
    let allPulls = [];
    let reportTitle = '';
    let bossName = '';
    let activeTab = 'latest';
    let currentSort = 'pull_number';
    let autoRefreshHandle = null;
    let currentFilter = null;

    // ── Session management ──────────────────────────────────────────────

    async function startSession() {
      const logUrl = document.getElementById('log-url').value.trim();
      const vodInput = document.getElementById('vod-url').value.trim();
      if (!logUrl) { showStatus('Enter a WarcraftLogs URL', 'error'); return; }

      const btn = document.getElementById('analyze-btn');
      btn.disabled = true;
      btn.textContent = 'Analyzing...';

      const startTime = performance.now();
      showStatus('Fetching data from WarcraftLogs and Twitch — 0s elapsed...', 'loading');
      const timerInterval = setInterval(() => {
        const elapsed = Math.floor((performance.now() - startTime) / 1000);
        showStatus(`Fetching data from WarcraftLogs and Twitch — ${elapsed}s elapsed...`, 'loading');
      }, 1000);

      const streamDelay = parseInt(document.getElementById('stream-delay').value) || 0;
      const body = { log: logUrl, delay: streamDelay };

      if (vodInput) {
        if (vodInput.includes('twitch.tv/videos/')) {
          body.vod = vodInput;
        } else {
          body.channel = vodInput.replace(/^https?:\/\/(www\.)?twitch\.tv\//, '').replace(/\/$/, '');
        }
      }

      try {
        const resp = await fetch('/api/session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await resp.json();
        clearInterval(timerInterval);

        if (data.error) { showStatus(data.error, 'error'); return; }

        sessionId = data.session_id;
        allPulls = data.pulls;
        reportTitle = data.report_title;
        bossName = data.boss_name;

        hideStatus();
        showSessionUI();
        switchTab('latest');
      } catch (e) {
        clearInterval(timerInterval);
        showStatus(`Request failed: ${e.message}`, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Analyze';
      }
    }

    async function refreshSession() {
      if (!sessionId) return;
      const btn = document.getElementById('refresh-btn');
      btn.disabled = true;
      btn.textContent = 'Refreshing...';

      try {
        const resp = await fetch(`/api/session/${sessionId}/refresh`, { method: 'POST' });
        const data = await resp.json();

        if (data.error) {
          if (data.error.includes('not found')) {
            showStatus('Session expired. Click Analyze to reload.', 'error');
            resetUI();
          } else {
            showStatus(data.error, 'error');
          }
          return;
        }

        if (data.new_pulls > 0) {
          allPulls.push(...data.new_pull_data);
          renderActiveTab();
          flashIndicator(`${data.new_pulls} new pull${data.new_pulls > 1 ? 's' : ''} detected!`);
        }
      } catch (e) {
        showStatus(`Refresh failed: ${e.message}`, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Refresh';
      }
    }

    function toggleAutoRefresh() {
      if (autoRefreshHandle) {
        clearInterval(autoRefreshHandle);
        autoRefreshHandle = null;
      }
      const enabled = document.getElementById('auto-refresh').checked;
      if (enabled) {
        const seconds = parseInt(document.getElementById('refresh-interval').value);
        autoRefreshHandle = setInterval(refreshSession, seconds * 1000);
      }
    }

    // ── UI helpers ──────────────────────────────────────────────────────

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = `status ${type}`;
    }
    function hideStatus() {
      document.getElementById('status').className = 'status';
    }

    function showSessionUI() {
      document.getElementById('refresh-btn').style.display = '';
      document.getElementById('refresh-controls').classList.add('visible');
      document.getElementById('tab-bar').classList.add('visible');
    }

    function resetUI() {
      sessionId = null;
      allPulls = [];
      document.getElementById('refresh-btn').style.display = 'none';
      document.getElementById('refresh-controls').classList.remove('visible');
      document.getElementById('tab-bar').classList.remove('visible');
      document.getElementById('tab-latest').innerHTML = '';
      document.getElementById('tab-all').innerHTML = '';
      document.getElementById('tab-stats').innerHTML = '';
      if (autoRefreshHandle) { clearInterval(autoRefreshHandle); autoRefreshHandle = null; }
      document.getElementById('auto-refresh').checked = false;
    }

    function flashIndicator(msg) {
      const el = document.getElementById('refresh-indicator');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ── Tab switching ───────────────────────────────────────────────────

    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      document.getElementById('tab-latest').style.display = tab === 'latest' ? '' : 'none';
      document.getElementById('tab-all').style.display = tab === 'all' ? '' : 'none';
      document.getElementById('tab-stats').style.display = tab === 'stats' ? '' : 'none';
      renderActiveTab();
    }

    function renderActiveTab() {
      if (activeTab === 'latest') renderLatestPull();
      else if (activeTab === 'all') renderAllPulls();
      else if (activeTab === 'stats') renderStatistics();
    }

    function filterByWipeCause(label) {
      currentFilter = label;
      switchTab('all');
    }

    function clearFilter() {
      currentFilter = null;
      renderAllPulls();
    }

    // ── Latest Pull tab ─────────────────────────────────────────────────

    function renderLatestPull() {
      const container = document.getElementById('tab-latest');
      if (!allPulls.length) {
        container.innerHTML = '<div class="latest-no-pull">No pulls yet. Waiting for data...</div>';
        return;
      }

      const pull = allPulls[allPulls.length - 1];
      const badge = pull.is_kill
        ? '<span class="kill-badge">Kill</span>'
        : '<span class="wipe-badge">Wipe</span>';

      let causeBlock = '';
      if (pull.is_kill) {
        causeBlock = `<div class="latest-kill-box"><div class="kill-title">Boss Killed!</div></div>`;
      } else if (pull.wipe) {
        const ctx = pull.wipe.context ? `<div class="wipe-context">${esc(pull.wipe.context)}</div>` : '';
        const vodLink = pull.wipe.vod_url
          ? `<a href="${pull.wipe.vod_url}" target="_blank">Watch in VOD &#9654;</a>` : '';
        causeBlock = `
          <div class="latest-wipe-box">
            <div class="wipe-title">${esc(pull.wipe.cause_label)}</div>
            <div class="wipe-desc">${esc(pull.wipe.cause_description)}</div>
            ${ctx}
            <div class="wipe-meta">
              <span>at ${pull.wipe.timestamp_display} into pull</span>
              ${vodLink}
            </div>
          </div>`;
      }

      // Combined death timeline
      const allDeaths = [...(pull.early_deaths || []), ...(pull.wipe_deaths || [])];
      allDeaths.sort((a, b) => a.fight_relative_ms - b.fight_relative_ms);

      let deathRows = '';
      if (allDeaths.length) {
        deathRows = `
          <div class="detail-section">
            <h3>Death Timeline (${allDeaths.length} deaths)</h3>
            <table class="death-table">
              <tr><th>#</th><th>Player</th><th>Time</th><th>Killed By</th><th>VOD</th></tr>
              ${allDeaths.map(d => `
                <tr style="${d.is_wipe_death ? 'background:#1c121488' : ''}">
                  <td class="timestamp">${d.death_order}</td>
                  <td class="player">${esc(d.player)}</td>
                  <td class="timestamp">${d.timestamp_display}</td>
                  <td class="cause" title="${esc(d.cause_description)}">${abilityLink(d.killing_ability, d.killing_ability_id)}</td>
                  <td>${d.vod_url ? `<a href="${d.vod_url}" target="_blank">&#9654; ${d.vod_time}</a>` : '&mdash;'}</td>
                </tr>
              `).join('')}
            </table>
          </div>`;
      }

      container.innerHTML = `
        <div class="latest-card">
          <div class="latest-header">
            <span class="latest-pull-num">#${pull.pull_number}</span>
            <div class="latest-meta">
              <span class="pull-duration">${pull.duration_display}</span>
              <span class="pull-phase">${pull.phase_reached}</span>
              ${badge}
            </div>
          </div>
          <div class="latest-body">
            ${causeBlock}
            ${deathRows}
          </div>
        </div>`;
      refreshTooltips();
    }

    // ── All Pulls tab ───────────────────────────────────────────────────

    function renderAllPulls() {
      const container = document.getElementById('tab-all');
      let pulls = [...allPulls];

      let filterBanner = '';
      if (currentFilter) {
        pulls = pulls.filter(p => p.wipe && p.wipe.cause_label === currentFilter);
        filterBanner = `
          <div class="filter-banner">
            <span class="filter-label">Filtered by:</span>
            <span class="filter-value">${esc(currentFilter)}</span>
            <span class="filter-clear" onclick="clearFilter()">Clear filter</span>
          </div>`;
      }

      pulls = sortPulls(pulls, currentSort);

      let html = filterBanner + `
        <div class="results-header">
          <h2>${esc(bossName)} &mdash; ${pulls.length}${currentFilter ? ' matching' : ''} pulls</h2>
          <div class="sort-controls">
            <label>Sort by:</label>
            <select onchange="changeSort(this.value)">
              <option value="pull_number" ${currentSort==='pull_number'?'selected':''}>Pull Order</option>
              <option value="duration" ${currentSort==='duration'?'selected':''}>Duration</option>
              <option value="phase" ${currentSort==='phase'?'selected':''}>Phase Reached</option>
              <option value="wipe_cause" ${currentSort==='wipe_cause'?'selected':''}>Wipe Cause</option>
            </select>
          </div>
        </div>
        <div class="pull-list">
      `;

      for (const pull of pulls) {
        const badge = pull.is_kill
          ? '<span class="kill-badge">Kill</span>'
          : '<span class="wipe-badge">Wipe</span>';
        const wipeLabel = pull.wipe ? pull.wipe.cause_label : (pull.is_kill ? 'Kill' : '—');
        const vodLink = pull.wipe && pull.wipe.vod_url
          ? `<a href="${pull.wipe.vod_url}" target="_blank">VOD &#9654;</a>` : '';

        html += `
          <div class="pull-card" id="pull-${pull.pull_number}">
            <div class="pull-header" onclick="togglePull(${pull.pull_number})">
              <span class="pull-num">#${pull.pull_number}</span>
              <span class="pull-duration">${pull.duration_display}</span>
              <span class="pull-phase">${pull.phase_reached}</span>
              ${badge}
              <span class="pull-wipe-label">${esc(wipeLabel)}</span>
              <span class="pull-vod-link">${vodLink}</span>
              <span class="pull-expand">&#9654;</span>
            </div>
            <div class="pull-detail">
              ${renderPullDetail(pull)}
            </div>
          </div>
        `;
      }

      html += '</div>';
      container.innerHTML = html;
      refreshTooltips();
    }

    function renderPullDetail(pull) {
      let html = '';

      if (pull.wipe) {
        const ctx = pull.wipe.context ? `<div class="wipe-context">${esc(pull.wipe.context)}</div>` : '';
        html += `
          <div class="detail-section">
            <h3>Wipe Cause</h3>
            <div class="wipe-box">
              <div class="wipe-title">${esc(pull.wipe.cause_label)}</div>
              <div class="wipe-desc">${esc(pull.wipe.cause_description)}</div>
              ${ctx}
              <div class="wipe-meta">
                <span>at ${pull.wipe.timestamp_display} into pull</span>
                ${pull.wipe.vod_url ? `<a href="${pull.wipe.vod_url}" target="_blank">Watch in VOD &#9654;</a>` : ''}
              </div>
            </div>
          </div>
        `;
      }

      if (pull.early_deaths && pull.early_deaths.length > 0) {
        html += `
          <div class="detail-section">
            <h3>Early Deaths (before wipe)</h3>
            <table class="death-table">
              <tr><th>#</th><th>Player</th><th>Time</th><th>Cause</th><th>VOD</th></tr>
              ${pull.early_deaths.map(d => `
                <tr>
                  <td class="timestamp">${d.death_order}</td>
                  <td class="player">${esc(d.player)}</td>
                  <td class="timestamp">${d.timestamp_display}</td>
                  <td class="cause" title="${esc(d.cause_description)}">${abilityLink(d.killing_ability, d.killing_ability_id)}</td>
                  <td>${d.vod_url ? `<a href="${d.vod_url}" target="_blank">&#9654; ${d.vod_time}</a>` : '&mdash;'}</td>
                </tr>
              `).join('')}
            </table>
          </div>
        `;
      }

      if (pull.wipe_deaths && pull.wipe_deaths.length > 0) {
        html += `
          <div class="detail-section">
            <h3>Wipe Deaths</h3>
            <table class="death-table">
              <tr><th>#</th><th>Player</th><th>Time</th><th>Killed By</th><th>VOD</th></tr>
              ${pull.wipe_deaths.map(d => `
                <tr>
                  <td class="timestamp">${d.death_order}</td>
                  <td class="player">${esc(d.player)}</td>
                  <td class="timestamp">${d.timestamp_display}</td>
                  <td class="cause" title="${esc(d.killing_ability)}">${abilityLink(d.killing_ability, d.killing_ability_id)}</td>
                  <td>${d.vod_url ? `<a href="${d.vod_url}" target="_blank">&#9654; ${d.vod_time}</a>` : '&mdash;'}</td>
                </tr>
              `).join('')}
            </table>
          </div>
        `;
      }

      if (!pull.wipe && (!pull.early_deaths || pull.early_deaths.length === 0) && (!pull.wipe_deaths || pull.wipe_deaths.length === 0)) {
        html += '<p class="no-deaths">No deaths recorded in this pull.</p>';
      }

      return html;
    }

    function togglePull(num) {
      const card = document.getElementById(`pull-${num}`);
      if (card) card.classList.toggle('open');
    }

    function sortPulls(pulls, key) {
      const sorted = [...pulls];
      switch (key) {
        case 'duration':
          sorted.sort((a, b) => a.duration_ms - b.duration_ms);
          break;
        case 'phase':
          sorted.sort((a, b) => a.phase_reached.localeCompare(b.phase_reached) || a.pull_number - b.pull_number);
          break;
        case 'wipe_cause':
          sorted.sort((a, b) => {
            const ca = a.wipe ? a.wipe.cause_label : 'Kill';
            const cb = b.wipe ? b.wipe.cause_label : 'Kill';
            return ca.localeCompare(cb) || a.pull_number - b.pull_number;
          });
          break;
        default:
          sorted.sort((a, b) => a.pull_number - b.pull_number);
      }
      return sorted;
    }

    function changeSort(value) {
      currentSort = value;
      renderAllPulls();
    }

    // ── Statistics tab ──────────────────────────────────────────────────

    function renderStatistics() {
      const container = document.getElementById('tab-stats');
      if (!allPulls.length) {
        container.innerHTML = '<div class="latest-no-pull">No pulls yet.</div>';
        return;
      }

      const wipes = allPulls.filter(p => !p.is_kill);
      const kills = allPulls.filter(p => p.is_kill);
      const avgDuration = wipes.length
        ? Math.round(wipes.reduce((s, p) => s + p.duration_ms, 0) / wipes.length)
        : 0;
      const bestPull = [...allPulls].sort((a, b) => b.duration_ms - a.duration_ms)[0];

      // Wipe cause counts
      const wipeCounts = {};
      for (const p of wipes) {
        const label = p.wipe ? p.wipe.cause_label : 'Unknown';
        wipeCounts[label] = (wipeCounts[label] || 0) + 1;
      }
      const wipeSorted = Object.entries(wipeCounts).sort((a, b) => b[1] - a[1]);
      const maxWipe = wipeSorted.length ? wipeSorted[0][1] : 1;

      // Phase counts
      const phaseCounts = {};
      for (const p of allPulls) {
        phaseCounts[p.phase_reached] = (phaseCounts[p.phase_reached] || 0) + 1;
      }
      const phaseSorted = Object.entries(phaseCounts).sort((a, b) => b[1] - a[1]);
      const maxPhase = phaseSorted.length ? phaseSorted[0][1] : 1;

      // Per-player early death counts (excludes wipe deaths)
      const playerDeaths = {};
      const playerCauses = {};
      for (const p of allPulls) {
        for (const d of (p.early_deaths || [])) {
          playerDeaths[d.player] = (playerDeaths[d.player] || 0) + 1;
          if (!playerCauses[d.player]) playerCauses[d.player] = {};
          playerCauses[d.player][d.cause_label] = (playerCauses[d.player][d.cause_label] || 0) + 1;
        }
      }
      const playerSorted = Object.entries(playerDeaths).sort((a, b) => b[1] - a[1]);

      // Top killing abilities (with spell IDs for tooltips)
      const abilityCounts = {};
      const abilityIds = {};
      for (const p of allPulls) {
        for (const d of [...(p.early_deaths || []), ...(p.wipe_deaths || [])]) {
          abilityCounts[d.killing_ability] = (abilityCounts[d.killing_ability] || 0) + 1;
          if (d.killing_ability_id) abilityIds[d.killing_ability] = d.killing_ability_id;
        }
      }
      const abilitySorted = Object.entries(abilityCounts).sort((a, b) => b[1] - a[1]).slice(0, 10);
      const maxAbility = abilitySorted.length ? abilitySorted[0][1] : 1;

      const barColors = ['#58a6ff', '#3fb950', '#f0883e', '#a371f7', '#f85149', '#79c0ff', '#56d364', '#d2a8ff', '#ffa657', '#ff7b72'];

      container.innerHTML = `
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value">${allPulls.length}</div>
            <div class="stat-label">Total Pulls</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${wipes.length}</div>
            <div class="stat-label">Wipes</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${kills.length}</div>
            <div class="stat-label">Kills</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${fmtMmss(avgDuration)}</div>
            <div class="stat-label">Avg Wipe Duration</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${bestPull.duration_display}</div>
            <div class="stat-label">Longest Pull (#${bestPull.pull_number})</div>
          </div>
        </div>

        <div class="stats-section">
          <h3>Wipe Cause Breakdown</h3>
          ${wipeSorted.map(([label, count], i) => `
            <div class="stat-bar-row" onclick="filterByWipeCause('${esc(label).replace(/'/g, "\\'")}')">
              <span class="stat-bar-label">${esc(label)}</span>
              <div class="stat-bar-track">
                <div class="stat-bar-fill" style="width:${(count/maxWipe*100).toFixed(1)}%;background:${barColors[i % barColors.length]}"></div>
              </div>
              <span class="stat-bar-count">${count}</span>
            </div>
          `).join('')}
        </div>

        <div class="stats-section">
          <h3>Phase Reached</h3>
          ${phaseSorted.map(([label, count], i) => `
            <div class="stat-bar-row">
              <span class="stat-bar-label">${esc(label)}</span>
              <div class="stat-bar-track">
                <div class="stat-bar-fill" style="width:${(count/maxPhase*100).toFixed(1)}%;background:${barColors[i % barColors.length]}"></div>
              </div>
              <span class="stat-bar-count">${count}</span>
            </div>
          `).join('')}
        </div>

        <div class="stats-section">
          <h3>Top Killing Abilities</h3>
          ${abilitySorted.map(([label, count], i) => `
            <div class="stat-bar-row">
              <span class="stat-bar-label">${abilityLink(label, abilityIds[label])}</span>
              <div class="stat-bar-track">
                <div class="stat-bar-fill" style="width:${(count/maxAbility*100).toFixed(1)}%;background:${barColors[i % barColors.length]}"></div>
              </div>
              <span class="stat-bar-count">${count}</span>
            </div>
          `).join('')}
        </div>

        <div class="stats-section">
          <h3>Early Deaths by Player</h3>
          <table class="stats-table">
            <tr><th>Player</th><th>Deaths</th><th>Most Common Cause</th></tr>
            ${playerSorted.map(([name, count]) => {
              const causes = playerCauses[name];
              const topCause = Object.entries(causes).sort((a, b) => b[1] - a[1])[0];
              return `<tr>
                <td class="player">${esc(name)}</td>
                <td>${count}</td>
                <td class="cause">${esc(topCause[0])} (${topCause[1]})</td>
              </tr>`;
            }).join('')}
          </table>
        </div>
      `;
      refreshTooltips();
    }

    // ── Utility ─────────────────────────────────────────────────────────

    function abilityLink(name, spellId) {
      if (!spellId) return esc(name);
      return `<a href="https://www.wowhead.com/spell=${spellId}" class="wowhead-link" data-wowhead="spell=${spellId}">${esc(name)}</a>`;
    }

    function refreshTooltips() {
      if (typeof $WowheadPower !== 'undefined') {
        $WowheadPower.refreshLinks();
      }
    }

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function fmtMmss(ms) {
      const totalSecs = Math.floor(ms / 1000);
      const m = Math.floor(totalSecs / 60);
      const s = totalSecs % 60;
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    // Enter key submits
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !document.getElementById('analyze-btn').disabled) {
        if (sessionId) refreshSession();
        else startSession();
      }
    });
  </script>
  <script>const whTooltips = {colorLinks: false, iconizeLinks: true, renameLinks: false};</script>
  <script src="https://wow.zamimg.com/js/tooltips.js"></script>
</body>
</html>
